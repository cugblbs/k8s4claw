apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s4claw.webhookServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s4claw.labels" . | nindent 4 }}
spec:
  ports:
    - name: webhook
      port: 443
      targetPort: {{ .Values.webhook.port }}
      protocol: TCP
  selector:
    {{- include "k8s4claw.selectorLabels" . | nindent 4 }}
