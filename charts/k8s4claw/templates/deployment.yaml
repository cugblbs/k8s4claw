apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s4claw.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s4claw.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "k8s4claw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s4claw.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "k8s4claw.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: operator
          image: {{ include "k8s4claw.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --health-probe-bind-address=:8081
            - --metrics-bind-address=:8080
            - --leader-elect={{ .Values.leaderElection.enabled }}
            - --enable-native-sidecars={{ .Values.nativeSidecars.enabled }}
            - --webhook-port={{ .Values.webhook.port }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: webhook-server-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      volumes:
        - name: webhook-server-cert
          secret:
            secretName: {{ include "k8s4claw.webhookCertSecretName" . }}
            defaultMode: 420
      securityContext:
        runAsNonRoot: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
