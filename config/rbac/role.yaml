apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s4claw-operator
rules:
  # Core resources
  - apiGroups: [""]
    resources: [pods, services, persistentvolumeclaims, secrets, events, configmaps, serviceaccounts]
    verbs: [get, list, watch, create, update, patch, delete]

  # Apps (StatefulSets)
  - apiGroups: ["apps"]
    resources: [statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]

  # CSI VolumeSnapshots
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: [volumesnapshots]
    verbs: [get, list, watch, create, delete]

  # RBAC (per-instance Role + RoleBinding for selfConfigure)
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, update, patch, delete]

  # CRDs
  - apiGroups: ["claw.prismer.ai"]
    resources: [claws, claws/status, clawchannels, clawchannels/status]
    verbs: [get, list, watch, create, update, patch, delete]

  # CRD finalizer subresources (scoped to update only)
  - apiGroups: ["claw.prismer.ai"]
    resources: [claws/finalizers, clawchannels/finalizers]
    verbs: [update]

  # ExternalSecrets (optional, for external-secrets-operator integration)
  - apiGroups: ["external-secrets.io"]
    resources: [externalsecrets]
    verbs: [get, list, watch, create, update, patch, delete]

  # Leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
