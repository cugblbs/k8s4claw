version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
    - whitespace
  settings:
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G101 # false positives on variable names like "token"
    revive:
      rules:
        - name: exported
          disabled: true
    gocritic:
      enabled-checks:
        - nilValReturn
        - rangeValCopy
  exclusions:
    paths:
      - vendor
    rules:
      - linters: [gocyclo]
        path: _test\.go
      - linters: [staticcheck]
        text: "QF"
        path: _test\.go
      - linters: [gosec]
        text: "G115"
        path: _test\.go

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
